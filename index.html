<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SiteSprout CRM - Spain Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-gray-100 min-h-screen p-4">

    <!-- Header Section -->
    <header class="max-w-md mx-auto mb-6 flex flex-col gap-2">
        <h1 class="text-2xl font-bold text-emerald-400">SiteSprout CRM</h1>
        <div class="flex items-center justify-between bg-gray-800 p-3 rounded-lg border border-gray-700">
            <span class="text-sm font-medium">Target Location:</span>
            <!-- City Dropdown Selector -->
            <select id="citySelect" onchange="updateCityData()" class="bg-gray-900 text-emerald-400 font-bold rounded p-1 border border-gray-600 focus:outline-none">
                <option value="Murcia">Murcia, Spain</option>
                <option value="Madrid">Madrid, Spain</option>
                <option value="Barcelona">Barcelona, Spain</option>
                <option value="Sevilla">Sevilla, Spain</option>
            </select>
        </div>
    </header>

    <!-- Main Section -->
    <main class="max-w-md mx-auto">
        <div class="bg-gray-800 rounded-xl p-4 border border-gray-700 shadow-xl">
            <h2 class="text-xl font-bold mb-4">Businesses Without Websites</h2>
            
            <!-- Category Tabs -->
            <div class="grid grid-cols-3 gap-2 mb-4">
                <button class="bg-emerald-600 text-white font-semibold py-2 px-3 rounded-lg text-sm">Restaurants</button>
                <button class="bg-gray-700 text-gray-300 font-semibold py-2 px-3 rounded-lg text-sm opacity-50">Bars</button>
                <button class="bg-gray-700 text-gray-300 font-semibold py-2 px-3 rounded-lg text-sm opacity-50">Barbers</button>
            </div>

            <!-- Dynamic Business Cards Container -->
            <div id="businessContainer" class="flex flex-col gap-4">
                <!-- Javascript will load cards here -->
            </div>
        </div>
    </main>

    <!-- Dynamic Functionality Script -->
    <script>
        // Database of businesses across different cities
        const cityData = {
            Murcia: [
                { name: "La Pequeña Taberna", rating: "4.7", address: "Plaza de San Juan, 4, 30003 Murcia", hours: "13:00 - 16:00, 20:00 - 00:00", phone: "+34 968 21 98 40" },
                { name: "Rincón de Pepe", rating: "4.5", address: "Plaza de Apóstoles, 30001 Murcia", hours: "13:30 - 16:00, 20:30 - 23:30", phone: "+34 968 21 22 39" }
            ],
            Madrid: [
                { name: "Taberna El Sur", rating: "4.6", address: "Calle de la Torrecilla del Leal, 12, 28012 Madrid", hours: "13:00 - 00:00", phone: "+34 915 27 51 31" },
                { name: "Asador Guetaria", rating: "4.4", address: "Calle de Aviación Española, 3, 28003 Madrid", hours: "13:30 - 16:00, 20:30 - 23:30", phone: "+34 915 54 62 25" }
            ],
            Barcelona: [
                { name: "Cervecería Catalana", rating: "4.6", address: "Carrer de Mallorca, 236, 08008 Barcelona", hours: "09:00 - 01:30", phone: "+34 932 16 03 68" },
                { name: "El Xampanyet", rating: "4.5", address: "Carrer de Montcada, 22, 08003 Barcelona", hours: "12:00 - 23:00", phone: "+34 933 19 53 64" }
            ],
            Sevilla: [
                { name: "Eslava", rating: "4.7", address: "Calle Eslava, 3, 41002 Sevilla", hours: "12:30 - 00:00", phone: "+34 954 90 65 24" },
                { name: "Taberna Coloniales", rating: "4.4", address: "Plaza de Cristo de Burgos, 19, 41003 Sevilla", hours: "12:00 - 16:00, 20:00 - 00:00", phone: "+34 954 50 11 37" }
            ]
        };

        function updateCityData() {
            const selectedCity = document.getElementById("citySelect").value;
            const container = document.getElementById("businessContainer");
            container.innerHTML = ""; // Clear current cards

            // Build new cards dynamically
            cityData[selectedCity].forEach(biz => {
                container.innerHTML += `
                    <div class="bg-gray-900 border border-gray-700 rounded-xl p-4 shadow-sm flex flex-col gap-3">
                        <div class="flex justify-between items-start">
                            <h3 class="text-lg font-bold text-gray-100">${biz.name}</h3>
                            <span class="bg-yellow-500/10 text-yellow-400 font-bold text-xs px-2 py-1 rounded border border-yellow-500/20">★ ${biz.rating}</span>
                        </div>
                        <div class="text-xs text-gray-400 flex flex-col gap-1">
                            <p>📍 ${biz.address}</p>
                            <p>🕒 Horario: ${biz.hours}</p>
                            <p>📞 Teléfono: ${biz.phone}</p>
                        </div>
                        <button class="w-full bg-emerald-500/10 hover:bg-emerald-500/20 text-emerald-400 border border-emerald-500/30 font-semibold py-2 rounded-lg text-sm transition-colors mt-1">
                            Generate Website
                        </button>
                    </div>
                `;
            });
        }

        // Initialize with default city (Murcia)
        updateCityData();
    </script>
</body>
</html>
